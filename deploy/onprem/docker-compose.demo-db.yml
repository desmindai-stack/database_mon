# İsteğe bağlı: izlenecek örnek PostgreSQL (öğrenme/test)
# Kullanım: docker compose -f docker-compose.yml -f docker-compose.demo-db.yml up -d

services:
  demo-postgres:
    image: postgres:16-alpine
    container_name: pgwatch-demo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    volumes:
      - ../../docker/init-demo.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    networks:
      - pgwatch-internal
    restart: unless-stopped
