services:
  postgres-demo:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5433:5432"
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - pg_stat_statements.track=all
    volumes:
      - ./docker/init-demo.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build:
      context: .
      dockerfile: deploy/onprem/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - pgwatch-data:/app/data
    environment:
      COLLECT_INTERVAL_SECONDS: 15
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
    depends_on:
      - postgres-demo

  frontend:
    build:
      context: .
      dockerfile: deploy/onprem/Dockerfile.web
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgwatch-data:
